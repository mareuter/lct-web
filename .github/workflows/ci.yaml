name: "Python CI"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"

jobs:
  lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run tox
        uses: lsst-sqre/run-tox@60388bf07b890f290280e7786796123574dd03eb # v1
        with:
          python-version: ${{ matrix.python }}
          tox-envs: "lint"

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run tox
        uses: lsst-sqre/run-tox@60388bf07b890f290280e7786796123574dd03eb # v1
        with:
          python-version: ${{ matrix.python }}
          tox-envs: "py,coverage-report"
